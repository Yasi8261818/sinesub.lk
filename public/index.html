<!DOCTYPE html>
<html lang="si">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CineSub.LK — Movies & Sinhala Subtitles</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════
   CINESUB.LK — COMPLETE STYLESHEET
   ═══════════════════════════════════════════ */
:root{
  --bg:#0a0a0a;--surface:#141414;--surface2:#1c1c1c;--surface3:#242424;
  --border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.12);
  --red:#e8192c;--red2:#c01020;--red3:rgba(232,25,44,0.15);
  --gold:#f5c518;--green:#21d07a;--blue:#01b4e4;
  --text:#ffffff;--muted:#aaaaaa;--muted2:#666666;
  --r:6px;--r2:10px;--r3:14px;
  --font:'Barlow',sans-serif;
  --font2:'Barlow Condensed',sans-serif;
  --font3:'Bebas Neue',cursive;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text) !important;font-family:var(--font);overflow-x:hidden;min-height:100vh;}
a{text-decoration:none;color:inherit;}
button{font-family:var(--font);}
::-webkit-scrollbar{width:6px;height:4px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--red);border-radius:3px;}

/* ── CINEMATIC LOADING SCREEN (UPGRADED) ── */
#loadingScreen {
  position:fixed;inset:0;background:radial-gradient(circle at center, #161616 0%, var(--bg) 100%);z-index:9999;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  transition:opacity 0.6s cubic-bezier(0.25, 1, 0.5, 1), transform 0.6s cubic-bezier(0.25, 1, 0.5, 1);
}
#loadingScreen.fade {opacity:0;transform:scale(1.05);pointer-events:none;}
.loader-content {
  text-align:center;display:flex;flex-direction:column;align-items:center;gap:24px;
}
.loader-logo {
  font-family:var(--font3);font-size:4.2rem;color:var(--red);letter-spacing:6px;
  animation:pulseLogo 2s infinite ease-in-out;
  text-shadow: 0 0 30px rgba(232, 25, 44, 0.3);
}
.loader-logo span {color:#fff;text-shadow: 0 0 20px rgba(255, 255, 255, 0.2);}
.loader-spinner-box {
  position: relative;width: 60px;height: 60px;margin-bottom: 10px;
}
.loader-circle {
  position: absolute;inset: 0;border: 3px solid transparent;border-top-color: var(--red);
  border-radius: 50%;animation: spinCircle 1s linear infinite;
}
.loader-circle-inner {
  position: absolute;inset: 6px;border: 3px solid transparent;border-bottom-color: #fff;
  border-radius: 50%;animation: spinCircleInner 1.5s linear infinite;
}
.loader-bar {
  width:240px;height:3px;background:rgba(255,255,255,0.05);border-radius:4px;overflow:hidden;position:relative;
}
.loader-fill {
  height:100%;background:linear-gradient(90deg, transparent, var(--red), #fff, var(--red), transparent);
  background-size: 200% 100%;
  animation: loadfill 1.6s infinite linear;width: 100%;
}
.loader-text {
  color:var(--muted);font-size:0.8rem;letter-spacing:4px;text-transform:uppercase;
  font-weight: 500;animation: pulseText 1.5s infinite ease-in-out;
}
@keyframes spinCircle { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
@keyframes spinCircleInner { 0% { transform: rotate(0deg); } 100% { transform: rotate(-360deg); } }
@keyframes loadfill { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
@keyframes pulseLogo { 0%, 100% { transform: scale(0.98); opacity: 0.9; } 50% { transform: scale(1.02); opacity: 1; text-shadow: 0 0 40px rgba(232, 25, 44, 0.5); } }
@keyframes pulseText { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; color: rgba(255,255,255,0.7); } }

/* ── NAVBAR ── */
#navbar{
  position:fixed;top:0;left:0;right:0;z-index:600;height:64px;
  display:flex;align-items:center;padding:0 4%;gap:20px;
  transition:background 0.3s;
  background:linear-gradient(180deg,rgba(10,10,10,0.95) 0%,rgba(10,10,10,0.5) 100%);
  backdrop-filter:blur(10px);
}
#navbar.solid{background:rgba(10,10,10,0.98);border-bottom:1px solid var(--border);}
.nav-logo{font-family:var(--font3);font-size:1.9rem;color:var(--red);letter-spacing:3px;cursor:pointer;user-select:none;flex-shrink:0;}
.nav-logo span{color:#fff;}
.nav-cats{display:flex;gap:2px;flex:1;overflow-x:auto;scrollbar-width:none;}
.nav-cats::-webkit-scrollbar{display:none;}
.nav-cat{
  padding:7px 15px;border-radius:var(--r);color:var(--muted);
  font-size:0.82rem;font-weight:600;white-space:nowrap;
  border:none;background:transparent;cursor:pointer;transition:all 0.18s;letter-spacing:0.3px;
}
.nav-cat:hover{color:var(--text) !important;background:var(--surface2);}
.nav-cat.active{color:var(--red);background:var(--surface2);}
.nav-right{display:flex;align-items:center;gap:10px;margin-left:auto;flex-shrink:0;}
.icon-btn{
  width:36px;height:36px;display:flex;align-items:center;justify-content:center;
  background:var(--surface2);border:1px solid var(--border2);border-radius:var(--r);
  cursor:pointer;color:var(--text) !important;font-size:0.95rem;transition:background 0.2s;
}
.icon-btn:hover{background:var(--surface3);}
.nav-search-wrap{position:relative;}
#searchInput{
  background:var(--surface2);border:1px solid var(--border2);color:var(--text) !important;
  padding:8px 38px 8px 14px;border-radius:var(--r);font-size:0.85rem;
  width:200px;transition:all 0.25s;outline:none;
}
#searchInput:focus{border-color:var(--red);width:260px;background:var(--surface3);}
.search-icon{position:absolute;right:11px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:0.9rem;pointer-events:none;}
#searchResults{
  position:absolute;top:calc(100% + 6px);right:0;width:320px;
  background:var(--surface);border:1px solid var(--border2);border-radius:var(--r2);
  max-height:65vh;overflow-y:auto;display:none;z-index:700;
  box-shadow:0 10px 40px rgba(0,0,0,0.7);
}
#searchResults.show{display:block;}
.sr-item{display:flex;gap:12px;padding:10px 14px;cursor:pointer;border-bottom:1px solid var(--border);transition:background 0.15s;align-items:center;}
.sr-item:last-child{border-bottom:none;}
.sr-item:hover{background:var(--surface2);}
.sr-poster{width:36px;height:52px;object-fit:cover;border-radius:4px;flex-shrink:0;background:var(--surface3);}
.sr-title{font-weight:600;font-size:0.88rem;margin-bottom:3px;}
.sr-year{color:var(--muted);font-size:0.75rem;}

/* ── PAGES ── */
.page{display:none;}
.page.active{display:block;}

/* ── HOME PAGE ── */
/* HERO (SLIDESHOW SLICK DESIGN) */
#heroSection{
  height:85vh;min-height:550px;position:relative;
  display:flex;align-items:flex-end;padding:0 4% 60px;overflow:hidden;
}
#heroBackdrop{
  position:absolute;inset:0;background-size:cover;
  background-position:center top;transition:background-image 0.8s ease-in-out, transform 0.8s ease-in-out;
}
#heroBackdrop.fade-effect {
  transform: scale(1.02);
}
.hero-overlay{
  position:absolute;inset:0;
  background:
    linear-gradient(90deg,rgba(10,10,10,0.98) 0%,rgba(10,10,10,0.6) 45%,transparent 100%),
    linear-gradient(0deg,rgba(10,10,10,1) 0%,rgba(10,10,10,0.2) 40%,transparent 80%);
}
.hero-content{position:relative;z-index:2;max-width:620px;transition:opacity 0.4s ease, transform 0.4s ease;}
.hero-content.changing {opacity:0;transform:translateY(10px);}
.hero-badges{display:flex;gap:7px;margin-bottom:14px;flex-wrap:wrap;}
.badge{padding:4px 10px;border-radius:4px;font-size:0.68rem;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;}
.badge-rank{background:var(--red);color:#fff;}
.badge-sub{background:rgba(33,208,122,0.15);color:var(--green);border:1px solid rgba(33,208,122,0.3);}
.badge-hd{background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.8);border:1px solid var(--border2);}
.hero-title{font-family:var(--font3);font-size:clamp(2.4rem,5.5vw,4.2rem);line-height:1;margin-bottom:10px;letter-spacing:1px;text-transform:uppercase;}
.hero-meta{display:flex;gap:14px;margin-bottom:14px;font-size:0.85rem;align-items:center;flex-wrap:wrap;}
.hero-rating{color:var(--gold);font-weight:700;}
.hero-year{color:var(--muted);}
.hero-genre{background:var(--surface2);padding:3px 9px;border-radius:4px;font-size:0.75rem;color:rgba(255,255,255,0.7);}
.hero-desc{color:rgba(255,255,255,0.68);font-size:0.95rem;line-height:1.65;margin-bottom:24px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;}
.hero-actions{display:flex;gap:12px;flex-wrap:wrap;}
.btn-play{
  background:#fff;color:#000;padding:12px 28px;border-radius:var(--r);
  font-weight:700;font-size:0.92rem;border:none;cursor:pointer;
  display:flex;align-items:center;gap:7px;transition:all 0.2s;
}
.btn-play:hover{opacity:0.88;transform:translateY(-1px);}
.btn-info{
  background:rgba(255,255,255,0.1);color:#fff;padding:12px 24px;
  border-radius:var(--r);font-weight:700;font-size:0.92rem;
  border:1px solid var(--border2);cursor:pointer;transition:all 0.2s;
  backdrop-filter:blur(4px);
}
.btn-info:hover{background:rgba(255,255,255,0.2);transform:translateY(-1px);}

/* HERO CAROUSEL INDICATORS */
.hero-indicators {
  position: absolute;right: 4%;bottom: 60px;display: flex;gap: 8px;z-index: 10;
}
.indicator-dot {
  width: 24px;height: 3px;background: rgba(255,255,255,0.2);border-radius: 2px;
  cursor: pointer;transition: all 0.3s ease;
}
.indicator-dot.active {
  background: var(--red);width: 40px;
}

/* CONTENT ROWS */
#mainContent{padding-bottom:50px;}
.section{padding:8px 4% 20px;}
.section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.section-title{font-family:var(--font2);font-size:1.2rem;font-weight:700;letter-spacing:0.5px;display:flex;align-items:center;gap:10px;}
.section-title-bar{width:3px;height:18px;background:var(--red);border-radius:2px;flex-shrink:0;}
.see-all{color:var(--blue);font-size:0.8rem;font-weight:600;cursor:pointer;transition:opacity 0.2s;}
.see-all:hover{opacity:0.75;}

/* SCROLL ROW */
.scroll-row{display:flex;gap:12px;overflow-x:auto;padding:4px 0 14px;scrollbar-width:thin;}
.scroll-row::-webkit-scrollbar{height:3px;}

/* GRID LAYOUT */
.grid-layout{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(155px,1fr));
  gap:16px;
}

/* MOVIE CARD */
.movie-card{
  flex:0 0 155px;position:relative;cursor:pointer;
  border-radius:var(--r);overflow:hidden;
  transition:transform 0.22s ease,box-shadow 0.22s ease;
  background:var(--surface2);
}
.movie-card:hover{transform:scale(1.06);z-index:10;box-shadow:0 12px 30px rgba(0,0,0,0.7);}
.movie-poster{width:100%;aspect-ratio:2/3;object-fit:cover;display:block;}
.movie-poster-placeholder{width:100%;aspect-ratio:2/3;background:var(--surface3);display:flex;align-items:center;justify-content:center;font-size:2.5rem;}
.card-rating{
  position:absolute;top:7px;left:7px;
  background:rgba(0,0,0,0.82);color:var(--gold);
  font-size:0.68rem;font-weight:700;padding:3px 6px;border-radius:4px;
}
.card-sub{
  position:absolute;top:7px;right:7px;
  background:var(--green);color:#000;
  font-size:0.62rem;font-weight:800;padding:3px 6px;border-radius:4px;
}
.card-hover-panel{
  position:absolute;bottom:0;left:0;right:0;
  background:linear-gradient(0deg,rgba(20,20,20,1) 0%,rgba(20,20,20,0.9) 70%,transparent 100%);
  padding:28px 10px 10px;
  opacity:0;transition:opacity 0.2s;
}
.movie-card:hover .card-hover-panel{opacity:1;}
.card-title{font-size:0.78rem;font-weight:700;color:#fff;margin-bottom:7px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.card-actions{display:flex;gap:5px;}
.ca-btn{
  flex:1;padding:5px 4px;border-radius:4px;border:none;
  font-size:0.68rem;font-weight:700;cursor:pointer;transition:opacity 0.2s;
}
.ca-play{background:#fff;color:#000;}
.ca-dl{background:var(--red);color:#fff;}
.ca-btn:hover{opacity:0.82;}

/* TOP 10 */
.top10-card{flex:0 0 175px;position:relative;cursor:pointer;padding-bottom:15px;}
.top10-num{
  position:absolute;bottom:0;left:-3px;
  font-family:var(--font3);font-size:5.5rem;line-height:1;
  color:var(--bg);-webkit-text-stroke:2px rgba(255,255,255,0.14);z-index:1;
}
.top10-inner{margin-left:28px;border-radius:var(--r);overflow:hidden;transition:transform 0.22s;}
.top10-card:hover .top10-inner{transform:scale(1.05);}
.top10-inner img{width:100%;aspect-ratio:2/3;object-fit:cover;display:block;}

/* ── DETAIL PAGE ── */
#detailPage{padding-top:0;}
.detail-hero{
  position:relative;min-height:72vh;
  display:flex;align-items:flex-end;
  padding:80px 4% 40px;
}
#detailBackdrop{
  position:absolute;inset:0;background-size:cover;
  background-position:center top;
}
.detail-hero-overlay{
  position:absolute;inset:0;
  background:
    linear-gradient(0deg,var(--bg) 0%,rgba(10,10,10,0.85) 50%,rgba(10,10,10,0.6) 100%),
    linear-gradient(90deg,var(--bg) 0%,transparent 60%);
}
.detail-hero-inner{position:relative;z-index:3;width:100%;max-width:1100px;margin:0 auto;}
.back-btn{
  display:inline-flex;align-items:center;gap:7px;
  background:var(--surface2);color:var(--text) !important;border:1px solid var(--border2);
  padding:9px 18px;border-radius:var(--r);font-weight:600;font-size:0.85rem;
  cursor:pointer;margin-bottom:28px;transition:all 0.2s;
}
.back-btn:hover{background:var(--red);border-color:var(--red);color:#fff;}
.detail-flex{display:flex;gap:36px;align-items:flex-start;}
.detail-poster-col{flex:0 0 220px;}
.detail-poster-col img{
  width:100%;border-radius:var(--r2);
  box-shadow:0 12px 40px rgba(0,0,0,0.8);
  border:1px solid var(--border2);display:block;
}
.detail-poster-col .no-poster{
  width:100%;aspect-ratio:2/3;background:var(--surface3);
  border-radius:var(--r2);display:flex;align-items:center;
  justify-content:center;font-size:4rem;
}
.detail-info-col{flex:1;min-width:0;}
.detail-title{font-family:var(--font3);font-size:clamp(2rem,4.5vw,3.5rem);line-height:1;margin-bottom:12px;letter-spacing:1px;}
.detail-meta-row{display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:14px;}
.meta-pill{
  padding:4px 11px;border-radius:20px;font-size:0.76rem;font-weight:600;
  background:var(--surface2);border:1px solid var(--border2);color:rgba(255,255,255,0.8);
}
.meta-pill.gold{color:var(--gold);background:rgba(245,197,24,0.1);border-color:rgba(245,197,24,0.2);}
.meta-pill.green{color:var(--green);background:rgba(33,208,122,0.1);border-color:rgba(33,208,122,0.2);}
.detail-genres{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:16px;}
.genre-tag{padding:4px 12px;border-radius:20px;font-size:0.75rem;background:var(--surface3);color:var(--muted);}
.detail-desc{color:rgba(255,255,255,0.7);font-size:0.96rem;line-height:1.72;margin-bottom:22px;}
.detail-actions{display:flex;gap:10px;flex-wrap:wrap;}
.btn-watch{background:var(--red);color:#fff;padding:12px 28px;border-radius:var(--r);font-weight:700;font-size:0.95rem;border:none;cursor:pointer;display:flex;align-items:center;gap:7px;transition:background 0.2s;}
.btn-watch:hover{background:var(--red2);}
.btn-trailer{background:transparent;color:#fff;padding:12px 22px;border-radius:var(--r);font-weight:700;font-size:0.95rem;border:1px solid var(--border2);cursor:pointer;transition:background 0.2s;}
.btn-trailer:hover{background:var(--surface2);}

/* PLAYER AREA */
.player-section{padding:0 4%;max-width:1100px;margin:0 auto 40px;}
.section-label{
  font-family:var(--font2);font-size:1.3rem;font-weight:700;
  margin-bottom:14px;padding-left:12px;
  border-left:3px solid var(--red);
  display:flex;align-items:center;justify-content:space-between;
}
.player-box{
  width:100%;aspect-ratio:16/9;background:#000;
  border-radius:var(--r2);overflow:hidden;position:relative;
  border:1px solid var(--border2);box-shadow:0 8px 30px rgba(0,0,0,0.6);
  margin-bottom:12px;
}
.player-box iframe{width:100%;height:100%;border:none;display:block;}
#playerPreScreen{
  position:absolute;inset:0;display:flex;
  align-items:center;justify-content:center;
  background:linear-gradient(135deg,#141414,#0a0a0a);
  flex-direction:column;gap:14px;text-align:center;padding:20px;
}
#playerPreScreen h3{font-family:var(--font2);font-size:1.5rem;font-weight:700;}
#playerPreScreen p{color:var(--muted);font-size:0.88rem;line-height:1.5;max-width:340px;}
.activate-btn{
  background:#fff;color:#000;border:none;padding:11px 26px;
  font-weight:700;font-size:0.9rem;border-radius:var(--r);
  cursor:pointer;margin-top:4px;display:flex;align-items:center;gap:7px;transition:opacity 0.2s;
}
.activate-btn:hover{opacity:0.85;}

/* SERVER SELECTOR */
.server-tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}
.srv-tab{
  padding:7px 16px;border-radius:var(--r);font-size:0.82rem;font-weight:600;
  background:var(--surface2);border:1px solid var(--border2);color:var(--muted);
  cursor:pointer;transition:all 0.18s;
}
.srv-tab:hover{color:var(--text) !important;border-color:rgba(255,255,255,0.2);}
.srv-tab.active{background:var(--red);border-color:var(--red);color:#fff;}
.srv-tab.error{border-color:rgba(232,25,44,0.5);color:rgba(232,25,44,0.6);}

/* TV SEASON SELECTOR */
.ep-controls{display:flex;gap:10px;margin-bottom:16px;align-items:center;flex-wrap:wrap;}
.ep-label{font-size:0.85rem;color:var(--muted);font-weight:600;}
.ep-select{
  background:var(--surface2);border:1px solid var(--border2);
  color:var(--text) !important;padding:7px 12px;border-radius:var(--r);
  font-size:0.85rem;outline:none;cursor:pointer;
}
.ep-select:focus{border-color:var(--red);}

/* DOWNLOAD */
.dl-list{display:flex;flex-direction:column;gap:10px;margin-bottom:30px;}
.dl-row{
  display:flex;align-items:center;justify-content:space-between;
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r);padding:13px 18px;gap:12px;
  transition:border-color 0.2s;
}
.dl-row:hover{border-color:var(--border2);}
.dl-row-left{display:flex;align-items:center;gap:12px;min-width:0;}
.dl-q{padding:4px 10px;border-radius:4px;font-size:0.73rem;font-weight:700;flex-shrink:0;}
.q-sub{background:rgba(33,208,122,0.15);color:var(--green);border:1px solid rgba(33,208,122,0.3);}
.q-4k{background:rgba(232,25,44,0.12);color:var(--red);border:1px solid rgba(232,25,44,0.25);}
.q-fhd{background:rgba(1,180,228,0.1);color:var(--blue);border:1px solid rgba(1,180,228,0.25);}
.q-hd{background:rgba(255,255,255,0.07);color:rgba(255,255,255,0.7);border:1px solid var(--border2);}
.dl-info{font-size:0.88rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.dl-size{font-size:0.78rem;color:var(--muted);}
.dl-btn{
  padding:8px 18px;border-radius:var(--r);font-size:0.83rem;font-weight:700;
  border:none;cursor:pointer;flex-shrink:0;transition:opacity 0.2s;
}
.dl-btn:hover{opacity:0.82;}
.dl-btn-sub{background:var(--green);color:#000;}
.dl-btn-file{background:var(--surface3);color:#fff;border:1px solid var(--border2);}

/* CAST */
.cast-scroll{display:flex;gap:14px;overflow-x:auto;padding-bottom:12px;}
.cast-card{flex:0 0 82px;text-align:center;cursor:default;}
.cast-avatar{
  width:64px;height:64px;border-radius:50%;object-fit:cover;
  margin:0 auto 7px;display:block;background:var(--surface3);
  border:2px solid var(--border2);
}
.cast-no-avatar{
  width:64px;height:64px;border-radius:50%;background:var(--surface3);
  margin:0 auto 7px;display:flex;align-items:center;justify-content:center;
  font-size:1.4rem;border:2px solid var(--border2);
}
.cast-name{font-size:0.72rem;font-weight:600;line-height:1.3;color:rgba(255,255,255,0.8);}
.cast-char{font-size:0.67rem;color:var(--muted);}

/* SIMILAR MOVIES */
.similar-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(130px,1fr));
  gap:12px;
}

/* ── SEARCH PAGE ── */
#searchPage{padding:84px 4% 50px;}
.search-header{margin-bottom:24px;}
.search-header h2{font-family:var(--font2);font-size:1.8rem;font-weight:700;margin-bottom:5px;}
.search-header p{color:var(--muted);font-size:0.9rem;}
#searchPageGrid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(155px,1fr));
  gap:16px;
}
.search-empty{text-align:center;padding:60px 20px;color:var(--muted);}
